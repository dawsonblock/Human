<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Runtime Assistant</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; display: flex; height: 100vh; overflow: hidden; }
  a { color: #60a5fa; text-decoration: none; }
  button { cursor: pointer; }

  /* Sidebar */
  #sidebar { width: 240px; min-width: 180px; background: #1a1d27; border-right: 1px solid #2d3148; display: flex; flex-direction: column; overflow: hidden; }
  #sidebar h1 { padding: 16px 14px 10px; font-size: 13px; font-weight: 700; color: #a0aec0; letter-spacing: .08em; text-transform: uppercase; }
  #run-list { flex: 1; overflow-y: auto; }
  .run-item { padding: 9px 14px; font-size: 13px; cursor: pointer; border-left: 3px solid transparent; display: flex; flex-direction: column; gap: 2px; }
  .run-item:hover { background: #23273a; }
  .run-item.selected { border-left-color: #60a5fa; background: #1e2235; }
  .run-item .run-id { font-weight: 600; color: #e2e8f0; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .run-item .run-status { font-size: 11px; color: #718096; }
  .status-running { color: #68d391 !important; }
  .status-paused { color: #f6ad55 !important; }
  .status-stopped, .status-completed { color: #718096 !important; }
  #new-run-btn { margin: 10px 12px 14px; padding: 8px 12px; background: #3b5bdb; border: none; border-radius: 6px; color: #fff; font-size: 13px; font-weight: 600; width: calc(100% - 24px); transition: background .15s; }
  #new-run-btn:hover { background: #4c6ef5; }

  /* Main */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #top-bar { padding: 12px 20px; background: #1a1d27; border-bottom: 1px solid #2d3148; display: flex; align-items: center; gap: 12px; }
  #top-bar h2 { font-size: 14px; color: #a0aec0; flex: 1; }
  #top-bar .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 600; }
  .badge-running { background: #276749; color: #9ae6b4; }
  .badge-paused { background: #7b341e; color: #fbd38d; }
  .badge-stopped, .badge-completed { background: #2d3748; color: #a0aec0; }
  #action-btns { display: flex; gap: 6px; }
  #action-btns button { padding: 5px 12px; border: none; border-radius: 5px; font-size: 12px; font-weight: 600; }
  #btn-pause { background: #744210; color: #fbd38d; }
  #btn-resume { background: #1a4731; color: #9ae6b4; }
  #btn-stop { background: #742a2a; color: #feb2b2; }

  /* Content grid */
  #content { flex: 1; display: grid; grid-template-columns: 1fr 340px; grid-template-rows: 1fr 220px; overflow: hidden; }

  /* Timeline */
  #timeline-panel { grid-column: 1; grid-row: 1; overflow-y: auto; padding: 14px 18px; display: flex; flex-direction: column; gap: 0; }
  .event-row { font-size: 12px; padding: 5px 0; border-bottom: 1px solid #1e2235; display: flex; gap: 10px; }
  .event-row:last-child { border-bottom: none; }
  .event-seq { color: #4a5568; min-width: 36px; text-align: right; }
  .event-type { color: #90cdf4; min-width: 160px; }
  .event-type.plan { color: #b794f4; }
  .event-type.approval { color: #f6ad55; }
  .event-type.goal { color: #68d391; }
  .event-payload { color: #718096; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 340px; }

  /* Right panel — state/plan */
  #right-panel { grid-column: 2; grid-row: 1 / 3; background: #1a1d27; border-left: 1px solid #2d3148; overflow-y: auto; display: flex; flex-direction: column; }
  .panel-section { border-bottom: 1px solid #2d3148; padding: 12px 14px; }
  .panel-section h3 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: #718096; margin-bottom: 8px; }
  .kv-row { display: flex; gap: 6px; font-size: 12px; margin-bottom: 3px; }
  .kv-key { color: #718096; min-width: 110px; }
  .kv-val { color: #e2e8f0; }
  .step-row { font-size: 12px; padding: 4px 0; display: flex; gap: 8px; align-items: flex-start; }
  .step-status { font-size: 10px; padding: 1px 6px; border-radius: 3px; font-weight: 700; white-space: nowrap; }
  .step-status.pending { background: #2d3748; color: #718096; }
  .step-status.running { background: #276749; color: #9ae6b4; }
  .step-status.completed { background: #1a3a2b; color: #68d391; }
  .step-status.failed { background: #742a2a; color: #feb2b2; }
  .step-desc { color: #cbd5e0; flex: 1; }
  .step-tool { color: #718096; font-size: 11px; }
  .art-row { font-size: 12px; padding: 4px 0; border-bottom: 1px solid #1e2235; }
  .art-row:last-child { border-bottom: none; }
  .art-title { color: #90cdf4; cursor: pointer; }
  .art-title:hover { text-decoration: underline; }
  .art-type { font-size: 11px; color: #718096; }

  /* Approvals panel */
  #approvals-panel { grid-column: 1; grid-row: 2; background: #1a1d27; border-top: 1px solid #2d3148; overflow-y: auto; padding: 12px 18px; }
  #approvals-panel h3 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: #f6ad55; margin-bottom: 10px; }
  .approval-card { background: #201c14; border: 1px solid #744210; border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; display: flex; flex-direction: column; gap: 5px; }
  .approval-card .ap-head { font-size: 12px; font-weight: 600; color: #fbd38d; }
  .approval-card .ap-detail { font-size: 11px; color: #a0916f; }
  .approval-card .ap-btns { display: flex; gap: 8px; margin-top: 4px; }
  .approval-card .ap-btns button { padding: 4px 12px; border: none; border-radius: 4px; font-size: 12px; font-weight: 600; }
  .btn-approve { background: #276749; color: #9ae6b4; }
  .btn-deny { background: #742a2a; color: #feb2b2; }
  #no-approvals { font-size: 12px; color: #4a5568; }

  /* Composer modal */
  #modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: none; align-items: center; justify-content: center; z-index: 100; }
  #modal-bg.open { display: flex; }
  #modal { background: #1a1d27; border: 1px solid #2d3148; border-radius: 10px; padding: 22px 24px; width: 480px; max-width: 95vw; display: flex; flex-direction: column; gap: 14px; }
  #modal h2 { font-size: 16px; font-weight: 700; color: #e2e8f0; }
  label { font-size: 12px; color: #a0aec0; display: block; margin-bottom: 4px; }
  select, input, textarea { width: 100%; background: #0f1117; border: 1px solid #2d3148; border-radius: 5px; color: #e2e8f0; font-size: 13px; padding: 7px 10px; outline: none; }
  select:focus, input:focus, textarea:focus { border-color: #3b5bdb; }
  textarea { resize: vertical; min-height: 70px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
  .modal-btns button { padding: 7px 18px; border: none; border-radius: 5px; font-size: 13px; font-weight: 600; }
  #modal-cancel { background: #2d3748; color: #a0aec0; }
  #modal-submit { background: #3b5bdb; color: #fff; }

  /* Artifact modal */
  #art-modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.75); display: none; align-items: center; justify-content: center; z-index: 110; }
  #art-modal-bg.open { display: flex; }
  #art-modal { background: #1a1d27; border: 1px solid #2d3148; border-radius: 10px; padding: 20px 22px; width: 640px; max-width: 96vw; max-height: 80vh; display: flex; flex-direction: column; gap: 10px; }
  #art-modal h3 { font-size: 14px; font-weight: 700; color: #90cdf4; }
  #art-modal pre { background: #0f1117; border: 1px solid #2d3148; border-radius: 5px; padding: 12px; overflow: auto; font-size: 11px; color: #cbd5e0; flex: 1; }
  #art-modal-close { align-self: flex-end; background: #2d3748; color: #a0aec0; border: none; border-radius: 4px; padding: 5px 14px; font-size: 12px; font-weight: 600; }
  #empty-state { display: flex; align-items: center; justify-content: center; flex: 1; color: #4a5568; font-size: 14px; grid-column: 1 / 3; grid-row: 1 / 3; }
</style>
</head>
<body>

<aside id="sidebar">
  <h1>Runs</h1>
  <div id="run-list"></div>
  <button id="new-run-btn">+ New Run</button>
</aside>

<main id="main">
  <div id="top-bar">
    <h2 id="run-title">Select or create a run</h2>
    <span id="run-badge" class="badge" style="display:none"></span>
    <div id="action-btns" style="display:none">
      <button id="btn-pause">Pause</button>
      <button id="btn-resume">Resume</button>
      <button id="btn-stop">Stop</button>
    </div>
  </div>
  <div id="content">
    <div id="empty-state">No run selected — create one or pick from the list.</div>
  </div>
</main>

<!-- Composer modal -->
<div id="modal-bg">
  <div id="modal">
    <h2>New Run</h2>
    <div>
      <label for="task-type">Task type</label>
      <select id="task-type">
        <option value="inspect_workspace">Inspect Workspace</option>
        <option value="summarize_files">Summarize Files</option>
        <option value="extract_facts">Extract Facts</option>
        <option value="draft_note">Draft Note</option>
        <option value="propose_write">Propose Write</option>
        <option value="operator_request">Generic Request</option>
      </select>
    </div>
    <div>
      <label for="goal-desc">Description</label>
      <textarea id="goal-desc" placeholder="What should the assistant do?"></textarea>
    </div>
    <div>
      <label for="max-actions">Max actions (0 = unlimited)</label>
      <input id="max-actions" type="number" value="10" min="0">
    </div>
    <div class="modal-btns">
      <button id="modal-cancel">Cancel</button>
      <button id="modal-submit">Start Run</button>
    </div>
  </div>
</div>

<!-- Artifact detail modal -->
<div id="art-modal-bg">
  <div id="art-modal">
    <h3 id="art-modal-title"></h3>
    <pre id="art-modal-body"></pre>
    <button id="art-modal-close">Close</button>
  </div>
</div>

<script>
const API = '';
let selectedRunId = null;
let sse = null;

// ---- Run list ----
async function loadRuns() {
  const resp = await fetch(`${API}/runs`);
  const data = await resp.json();
  const runs = data.runs || [];
  const list = document.getElementById('run-list');
  list.innerHTML = '';
  runs.sort((a, b) => b.updated_at - a.updated_at);
  for (const r of runs) {
    const div = document.createElement('div');
    div.className = 'run-item' + (r.run_id === selectedRunId ? ' selected' : '');
    div.innerHTML = `<span class="run-id">${r.run_id}</span><span class="run-status status-${r.status}">${r.status}</span>`;
    div.onclick = () => selectRun(r.run_id);
    list.appendChild(div);
  }
}

// ---- Select a run ----
async function selectRun(runId) {
  selectedRunId = runId;
  document.querySelectorAll('.run-item').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('.run-item').forEach(el => {
    if (el.querySelector('.run-id')?.textContent === runId) el.classList.add('selected');
  });

  // Remove empty state, build panels
  const content = document.getElementById('content');
  content.innerHTML = `
    <div id="timeline-panel"></div>
    <div id="right-panel">
      <div class="panel-section" id="summary-section"><h3>Summary</h3><div id="summary-body"></div></div>
      <div class="panel-section" id="goal-section"><h3>Goal</h3><div id="goal-body"><span style="color:#4a5568;font-size:12px">No goal</span></div></div>
      <div class="panel-section" id="plan-section"><h3>Plan</h3><div id="plan-body"><span style="color:#4a5568;font-size:12px">No plan</span></div></div>
      <div class="panel-section" id="artifacts-section"><h3>Artifacts</h3><div id="artifacts-body"></div></div>
    </div>
    <div id="approvals-panel"><h3>⚠ Pending Approvals</h3><div id="approvals-body"><span id="no-approvals" style="color:#4a5568;font-size:12px">None</span></div></div>
  `;

  document.getElementById('run-title').textContent = runId;
  document.getElementById('action-btns').style.display = 'flex';

  await refreshSummary(runId);
  subscribeSSE(runId);
}

async function refreshSummary(runId) {
  const [summaryResp, planResp, artifactsResp] = await Promise.all([
    fetch(`${API}/runs/${runId}/summary`),
    fetch(`${API}/runs/${runId}/plan`),
    fetch(`${API}/runs/${runId}/artifacts`),
  ]);
  const summary = await summaryResp.json();
  const plan = await planResp.json();
  const artifacts = await artifactsResp.json();

  // Update badge
  const badge = document.getElementById('run-badge');
  badge.textContent = summary.status;
  badge.className = `badge badge-${summary.status}`;
  badge.style.display = 'inline';

  // Summary panel
  const sb = document.getElementById('summary-body');
  if (sb) sb.innerHTML = kvRows({
    'Status': `<span class="status-${summary.status}">${summary.status}</span>`,
    'Cycle': summary.cycle_id,
    'Actions': summary.total_actions,
    'Stop reason': summary.stop_reason || '—',
    'Plan step': summary.plan_current_step !== null ? summary.plan_current_step : '—',
    'Artifacts': summary.artifact_count,
  });

  // Goal panel
  const gb = document.getElementById('goal-body');
  if (gb) {
    if (summary.goal) {
      gb.innerHTML = kvRows({
        'Type': summary.goal.type,
        'Status': `<span class="status-${summary.goal.status}">${summary.goal.status}</span>`,
        'Description': escHtml(summary.goal.description.slice(0, 120)),
      });
    } else {
      gb.innerHTML = '<span style="color:#4a5568;font-size:12px">No goal</span>';
    }
  }

  // Plan panel
  const pb = document.getElementById('plan-body');
  if (pb) {
    if (plan.plan) {
      const p = plan.plan;
      let html = kvRows({ 'Status': p.status, 'Step': `${p.current_step} / ${p.steps.length}` });
      html += p.steps.map((s, i) => `
        <div class="step-row">
          <span class="step-status ${s.status}">${s.status}</span>
          <span>
            <div class="step-desc">${escHtml(s.description)}</div>
            <div class="step-tool">${s.tool_name}</div>
          </span>
        </div>`).join('');
      pb.innerHTML = html;
    } else {
      pb.innerHTML = '<span style="color:#4a5568;font-size:12px">No plan</span>';
    }
  }

  // Artifacts panel
  const ab = document.getElementById('artifacts-body');
  if (ab) {
    if (artifacts.artifacts && artifacts.artifacts.length > 0) {
      ab.innerHTML = artifacts.artifacts.map(a => `
        <div class="art-row">
          <div class="art-title" onclick='showArtifact(${JSON.stringify(a)})'>${escHtml(a.title)}</div>
          <div class="art-type">${a.type} — ${new Date(a.created_at * 1000).toLocaleTimeString()}</div>
        </div>`).join('');
    } else {
      ab.innerHTML = '<span style="color:#4a5568;font-size:12px">No artifacts yet</span>';
    }
  }

  // Approvals
  const apBody = document.getElementById('approvals-body');
  if (apBody) {
    const pending = summary.pending_approvals || [];
    if (pending.length === 0) {
      apBody.innerHTML = '<span id="no-approvals" style="color:#4a5568;font-size:12px">None</span>';
    } else {
      apBody.innerHTML = pending.map(req => `
        <div class="approval-card">
          <div class="ap-head">Action: ${req.tool_name}</div>
          <div class="ap-detail">Reason: ${escHtml(req.reason || '')}</div>
          <div class="ap-detail">Resource: ${escHtml(req.affected_resource || req.arguments?.path || '—')}</div>
          <div class="ap-detail">ID: ${req.action_id}</div>
          <div class="ap-btns">
            <button class="btn-approve" onclick="approveAction('${runId}','${req.action_id}')">Approve</button>
            <button class="btn-deny" onclick="denyAction('${runId}','${req.action_id}')">Deny</button>
          </div>
        </div>`).join('');
    }
  }
}

// ---- Timeline via SSE ----
function subscribeSSE(runId) {
  if (sse) { sse.close(); sse = null; }
  const tl = document.getElementById('timeline-panel');
  if (!tl) return;

  sse = new EventSource(`${API}/runs/${runId}/events`);
  sse.onmessage = () => {}; // handled per event type below
  sse.addEventListener('cycle_completed', e => appendEvent(JSON.parse(e.data)));
  sse.addEventListener('tool_call_executed', e => appendEvent(JSON.parse(e.data)));
  sse.addEventListener('tool_call_failed', e => appendEvent(JSON.parse(e.data)));
  sse.addEventListener('plan_created', e => { appendEvent(JSON.parse(e.data)); refreshSummary(runId); });
  sse.addEventListener('plan_step_completed', e => { appendEvent(JSON.parse(e.data)); refreshSummary(runId); });
  sse.addEventListener('plan_step_failed', e => { appendEvent(JSON.parse(e.data)); refreshSummary(runId); });
  sse.addEventListener('plan_step_started', e => { appendEvent(JSON.parse(e.data)); refreshSummary(runId); });
  sse.addEventListener('goal_completed', e => { appendEvent(JSON.parse(e.data)); refreshSummary(runId); loadRuns(); });
  sse.addEventListener('approval_requested', e => { appendEvent(JSON.parse(e.data)); refreshSummary(runId); });
  sse.addEventListener('approval_granted', e => { appendEvent(JSON.parse(e.data)); refreshSummary(runId); });
  sse.addEventListener('approval_denied', e => { appendEvent(JSON.parse(e.data)); refreshSummary(runId); });
  sse.addEventListener('run_finished', e => { appendEvent(JSON.parse(e.data)); loadRuns(); refreshSummary(runId); });
  sse.addEventListener('run_paused', e => { appendEvent(JSON.parse(e.data)); loadRuns(); refreshSummary(runId); });
  sse.addEventListener('run_resumed', e => { appendEvent(JSON.parse(e.data)); loadRuns(); refreshSummary(runId); });
  sse.onerror = () => { /* reconnect handled by browser */ };
}

function appendEvent(data) {
  const tl = document.getElementById('timeline-panel');
  if (!tl) return;
  const row = document.createElement('div');
  row.className = 'event-row';
  const typeClass = data.type?.includes('plan') ? 'plan' : data.type?.includes('approval') ? 'approval' : data.type?.includes('goal') ? 'goal' : '';
  const payload = JSON.stringify(data.payload || {});
  row.innerHTML = `
    <span class="event-seq">${data.seq}</span>
    <span class="event-type ${typeClass}">${data.type}</span>
    <span class="event-payload">${escHtml(payload.slice(0, 120))}</span>`;
  tl.appendChild(row);
  tl.scrollTop = tl.scrollHeight;
}

// ---- Actions ----
document.getElementById('btn-pause').onclick = async () => {
  if (!selectedRunId) return;
  await fetch(`${API}/runs/${selectedRunId}/pause`, { method: 'POST' });
  loadRuns(); refreshSummary(selectedRunId);
};
document.getElementById('btn-resume').onclick = async () => {
  if (!selectedRunId) return;
  await fetch(`${API}/runs/${selectedRunId}/resume`, { method: 'POST' });
  loadRuns(); refreshSummary(selectedRunId);
};
document.getElementById('btn-stop').onclick = async () => {
  if (!selectedRunId) return;
  await fetch(`${API}/runs/${selectedRunId}`, { method: 'DELETE' });
  loadRuns();
};

async function approveAction(runId, actionId) {
  await fetch(`${API}/runs/${runId}/approve`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({action_id: actionId}) });
  refreshSummary(runId);
}
async function denyAction(runId, actionId) {
  await fetch(`${API}/runs/${runId}/deny`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({action_id: actionId}) });
  refreshSummary(runId);
}

// ---- Composer ----
document.getElementById('new-run-btn').onclick = () => document.getElementById('modal-bg').classList.add('open');
document.getElementById('modal-cancel').onclick = () => document.getElementById('modal-bg').classList.remove('open');
document.getElementById('modal-submit').onclick = async () => {
  const type = document.getElementById('task-type').value;
  const desc = document.getElementById('goal-desc').value.trim() || `${type} task`;
  const maxA = parseInt(document.getElementById('max-actions').value) || 0;
  const body = {
    inputs: {},
    config: { max_actions: maxA, tick_interval_sec: 0.2 },
    goal: { type, description: desc },
  };
  const resp = await fetch(`${API}/runs`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const data = await resp.json();
  document.getElementById('modal-bg').classList.remove('open');
  document.getElementById('goal-desc').value = '';
  await loadRuns();
  selectRun(data.run_id);
};

// ---- Artifact modal ----
function showArtifact(a) {
  document.getElementById('art-modal-title').textContent = a.title;
  document.getElementById('art-modal-body').textContent = JSON.stringify(a.content, null, 2);
  document.getElementById('art-modal-bg').classList.add('open');
}
document.getElementById('art-modal-close').onclick = () => document.getElementById('art-modal-bg').classList.remove('open');
document.getElementById('art-modal-bg').onclick = e => { if (e.target === document.getElementById('art-modal-bg')) document.getElementById('art-modal-bg').classList.remove('open'); };

// ---- Helpers ----
function kvRows(obj) {
  return Object.entries(obj).map(([k, v]) => `<div class="kv-row"><span class="kv-key">${k}</span><span class="kv-val">${v}</span></div>`).join('');
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ---- Init ----
loadRuns();
setInterval(loadRuns, 8000);
</script>
</body>
</html>
